<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>목표주가 트래커</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #f5f5f7;
    --surface: #ffffff;
    --surface2: #f0f0f3;
    --border: #e0e0e6;
    --text: #1a1a2e;
    --dim: #7c7c8a;
    --accent: #6366f1;
    --accent2: #818cf8;
    --my-line: #e11d48;
    --con-avg: #d97706;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Inter', sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
  }

  /* Top bar */
  .topbar {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 24px;
    background: var(--surface); border-bottom: 1px solid var(--border);
    box-shadow: 0 1px 3px rgba(0,0,0,.04);
  }
  .topbar h1 {
    font-size: 17px; font-weight: 700;
    background: linear-gradient(135deg, #6366f1, #a855f7);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-right: auto;
  }

  /* Inputs */
  input, select {
    padding: 7px 10px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text); font-size: 13px; outline: none;
  }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(99,102,241,.12); }
  .btn {
    padding: 7px 14px; border-radius: 6px; font-size: 12px; font-weight: 600;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text); cursor: pointer; white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent); background: rgba(99,102,241,.06); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); }

  /* Layout */
  .body { display: flex; flex: 1; overflow: hidden; }

  /* Sidebar */
  .sidebar {
    width: 320px; min-width: 320px;
    background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .sidebar-header {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    font-size: 13px; font-weight: 600; color: var(--dim);
    display: flex; align-items: center; justify-content: space-between;
  }
  .entry-list { flex: 1; overflow-y: auto; padding: 8px; }
  .entry-item {
    display: flex; align-items: flex-start; justify-content: space-between;
    padding: 8px 10px; border-radius: 6px; font-size: 13px;
    margin-bottom: 2px; transition: background .12s;
  }
  .entry-item:hover { background: var(--surface2); }
  .entry-left { display: flex; flex-direction: column; gap: 1px; flex: 1; min-width: 0; }
  .entry-date { font-size: 11px; color: var(--dim); }
  .entry-source {
    font-size: 10px; color: var(--accent); opacity: .7;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    max-width: 180px;
  }
  .entry-source a { color: var(--accent); text-decoration: none; }
  .entry-source a:hover { text-decoration: underline; opacity: 1; }
  .entry-tp { font-weight: 700; font-size: 14px; white-space: nowrap; color: var(--text); }
  .del-btn {
    background: none; border: none; color: var(--dim);
    cursor: pointer; font-size: 16px; padding: 4px 6px; border-radius: 4px;
  }
  .del-btn:hover { color: #e11d48; background: rgba(225,29,72,.08); }
  .entry-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

  /* Add form */
  .add-form {
    padding: 12px; border-top: 1px solid var(--border);
    background: var(--surface2);
  }
  .add-row { display: flex; gap: 6px; margin-bottom: 6px; }
  .add-row input, .add-row select { flex: 1; min-width: 0; }

  /* Chart area */
  .chart-area {
    flex: 1; display: flex; flex-direction: column; padding: 20px 24px;
    overflow: hidden;
  }
  .chart-wrap {
    flex: 1; position: relative; min-height: 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,.04);
  }
  .chart-inner { position: relative; width: 100%; height: 100%; }

  /* My price bar */
  .my-price-bar {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 16px; padding: 12px 16px;
    background: #fff0f3; border: 1px solid var(--my-line);
    border-radius: 10px;
  }
  .my-price-bar label {
    font-size: 13px; font-weight: 600; color: var(--my-line);
    white-space: nowrap;
  }
  .my-price-bar input {
    width: 140px; border-color: var(--my-line);
    font-weight: 700; font-size: 15px; color: var(--my-line);
    background: #fff5f7;
  }
  .my-price-bar .gap-info {
    font-size: 13px; color: var(--dim); margin-left: auto;
  }
  .gap-info .up { color: #e11d48; font-weight: 700; }
  .gap-info .down { color: #2563eb; font-weight: 700; }
  .gap-info .even { color: var(--dim); font-weight: 700; }

  /* Stats row */
  .stats-row { display: flex; gap: 12px; margin-bottom: 16px; }
  .stat-card {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px;
    box-shadow: 0 1px 3px rgba(0,0,0,.03);
  }
  .stat-label { font-size: 11px; color: var(--dim); margin-bottom: 2px; }
  .stat-value { font-size: 20px; font-weight: 700; color: var(--text); }
  .stat-sub { font-size: 11px; color: var(--dim); margin-top: 2px; }

  /* Empty */
  .empty {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100%; color: var(--dim);
    text-align: center; font-size: 14px; line-height: 1.7;
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: .4; }

  /* Stock tabs */
  .stock-tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .stock-tab {
    padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--dim); cursor: pointer; transition: all .12s;
  }
  .stock-tab:hover { border-color: var(--accent); color: var(--text); }
  .stock-tab.active {
    background: var(--accent); border-color: var(--accent); color: #fff;
  }
  .stock-tab .x { margin-left: 4px; font-size: 11px; opacity: .6; }
  .stock-tab .x:hover { opacity: 1; }

  .io-btns { display: flex; gap: 6px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #d0d0d8; border-radius: 3px; }
</style>
</head>
<body>

<div class="topbar">
  <h1>TP Tracker</h1>
  <div class="io-btns">
    <button class="btn" onclick="exportJSON()">저장 (JSON)</button>
    <button class="btn" onclick="document.getElementById('loadFile').click()">불러오기</button>
    <input type="file" id="loadFile" accept=".json" style="display:none" onchange="importJSON(event)">
    <button class="btn" onclick="exportCSV()">CSV 내보내기</button>
  </div>
</div>

<div class="body">
  <div class="sidebar">
    <div class="sidebar-header">
      <span>리포트 목록</span>
      <span id="entryCount" style="font-weight:400">0건</span>
    </div>
    <div class="entry-list" id="entryList">
      <div class="empty" style="height:200px">
        <div class="empty-icon">📋</div>
        아래에서 데이터를 추가하세요
      </div>
    </div>
    <div class="add-form">
      <div class="add-row">
        <input type="text" id="inStock" placeholder="종목명" list="dl_stocks" style="flex:1.2">
        <datalist id="dl_stocks"></datalist>
        <input type="date" id="inDate" style="flex:1">
      </div>
      <div class="add-row">
        <input type="text" id="inBroker" placeholder="증권사" list="dl_brokers">
        <datalist id="dl_brokers"></datalist>
        <input type="number" id="inTP" placeholder="목표주가 (원)">
      </div>
      <div class="add-row">
        <input type="text" id="inSource" placeholder="출처 (URL 또는 메모)" style="flex:1">
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-primary" style="flex:1" onclick="addEntry()">추가</button>
        <button class="btn" onclick="clearInputs()">초기화</button>
      </div>
    </div>
  </div>

  <div class="chart-area" id="chartArea">
    <div class="empty" id="emptyMain">
      <div class="empty-icon">📈</div>
      종목 데이터를 입력하면<br>목표주가 계단식 차트가 그려집니다.
    </div>

    <div id="dashWrap" style="display:none">
      <div class="stock-tabs" id="stockTabs"></div>

      <div class="my-price-bar">
        <label>★ 내 목표주가</label>
        <input type="number" id="myTP" placeholder="0" oninput="onMyTPChange()">
        <div class="gap-info" id="gapInfo"></div>
      </div>

      <div class="stats-row" id="statsRow"></div>

      <div class="chart-wrap">
        <div class="chart-inner"><canvas id="mainChart"></canvas></div>
      </div>
    </div>
  </div>
</div>

<script>
let entries = [];
let myTargets = {};
let activeStock = null;
let chart = null;

function addEntry() {
  const stock = document.getElementById('inStock').value.trim();
  const date = document.getElementById('inDate').value;
  const broker = document.getElementById('inBroker').value.trim();
  const tp = parseFloat(document.getElementById('inTP').value);
  const source = document.getElementById('inSource').value.trim();
  if (!stock || !date || !tp) { alert('종목명, 날짜, 목표주가는 필수입니다.'); return; }
  entries.push({ id: Date.now() + Math.random(), stock, date, broker, tp, source });
  entries.sort((a,b) => a.date.localeCompare(b.date));
  updateSuggestions();
  selectStock(stock);
  clearInputs();
}

function removeEntry(id) {
  entries = entries.filter(e => e.id !== id);
  render();
}

function clearInputs() {
  document.getElementById('inBroker').value = '';
  document.getElementById('inTP').value = '';
  document.getElementById('inSource').value = '';
}

function getStocks() { return [...new Set(entries.map(e => e.stock))]; }

function selectStock(name) { activeStock = name; render(); }

function removeStock(name) {
  entries = entries.filter(e => e.stock !== name);
  delete myTargets[name];
  if (activeStock === name) activeStock = getStocks()[0] || null;
  render();
}

function onMyTPChange() {
  if (!activeStock) return;
  myTargets[activeStock] = parseFloat(document.getElementById('myTP').value) || null;
  render();
}

function render() {
  const stocks = getStocks();
  if (stocks.length === 0) {
    document.getElementById('emptyMain').style.display = 'flex';
    document.getElementById('dashWrap').style.display = 'none';
    document.getElementById('entryList').innerHTML = '<div class="empty" style="height:200px"><div class="empty-icon">📋</div>아래에서 데이터를 추가하세요</div>';
    document.getElementById('entryCount').textContent = '0건';
    return;
  }
  document.getElementById('emptyMain').style.display = 'none';
  document.getElementById('dashWrap').style.display = 'block';
  if (!activeStock || !stocks.includes(activeStock)) activeStock = stocks[0];

  document.getElementById('stockTabs').innerHTML = stocks.map(s =>
    `<div class="stock-tab ${s === activeStock ? 'active' : ''}" onclick="selectStock('${esc(s)}')">
      ${s}<span class="x" onclick="event.stopPropagation();removeStock('${esc(s)}')">&times;</span>
    </div>`
  ).join('');

  document.getElementById('myTP').value = myTargets[activeStock] || '';
  const items = entries.filter(e => e.stock === activeStock).sort((a,b) => a.date.localeCompare(b.date));

  document.getElementById('entryCount').textContent = entries.length + '건';
  const listItems = entries.filter(e => e.stock === activeStock).sort((a,b) => b.date.localeCompare(a.date));
  document.getElementById('entryList').innerHTML = listItems.map(e => {
    let srcHtml = '';
    if (e.source) {
      if (e.source.startsWith('http')) {
        let domain = '';
        try { domain = new URL(e.source).hostname.replace('www.',''); } catch(_) { domain = e.source; }
        srcHtml = `<span class="entry-source"><a href="${e.source}" target="_blank" title="${e.source}">${domain}</a></span>`;
      } else {
        srcHtml = `<span class="entry-source" title="${e.source}">${e.source}</span>`;
      }
    }
    return `
    <div class="entry-item">
      <div class="entry-left">
        <span class="entry-date">${e.date}${e.broker ? ' · ' + e.broker : ''}</span>
        ${srcHtml}
      </div>
      <div class="entry-right">
        <span class="entry-tp">${e.tp.toLocaleString()}원</span>
        <button class="del-btn" onclick="removeEntry(${e.id})">&times;</button>
      </div>
    </div>`;
  }).join('');

  renderStats(items);
  renderChart(items);
  renderGap(items);
}

function renderStats(items) {
  if (items.length === 0) { document.getElementById('statsRow').innerHTML = ''; return; }
  const tps = items.map(e => e.tp);
  const avg = Math.round(tps.reduce((a,b) => a+b, 0) / tps.length);
  const max = Math.max(...tps);
  const min = Math.min(...tps);
  const latest = tps[tps.length - 1];
  const brokers = [...new Set(items.map(e => e.broker).filter(Boolean))].length;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-label">컨센서스 평균</div><div class="stat-value">${avg.toLocaleString()}</div><div class="stat-sub">${items.length}건 · ${brokers}개 증권사</div></div>
    <div class="stat-card"><div class="stat-label">최고</div><div class="stat-value">${max.toLocaleString()}</div></div>
    <div class="stat-card"><div class="stat-label">최저</div><div class="stat-value">${min.toLocaleString()}</div></div>
    <div class="stat-card"><div class="stat-label">최신</div><div class="stat-value">${latest.toLocaleString()}</div><div class="stat-sub">${items[items.length-1].date}</div></div>
  `;
}

function renderGap(items) {
  const myTP = myTargets[activeStock];
  const info = document.getElementById('gapInfo');
  if (!myTP || items.length === 0) { info.innerHTML = ''; return; }
  const avg = Math.round(items.map(e => e.tp).reduce((a,b) => a+b, 0) / items.length);
  const diff = ((myTP - avg) / avg * 100).toFixed(1);
  let cls = 'even', sign = '';
  if (diff > 0) { cls = 'up'; sign = '+'; }
  else if (diff < 0) { cls = 'down'; }
  info.innerHTML = `컨센 평균 대비 <span class="${cls}">${sign}${diff}%</span>`;
}

// ── Chart ──
function renderChart(items) {
  if (chart) chart.destroy();
  if (items.length === 0) return;

  const allDates = [...new Set(items.map(e => e.date))].sort();
  const labels = allDates.map(d => { const p = d.split('-'); return p[1] + '/' + p[2]; });

  const brokers = [...new Set(items.map(e => e.broker || '미지정'))];
  const palette = ['#6366f1','#16a34a','#ea580c','#0891b2','#db2777','#dc2626','#7c3aed','#0d9488','#c2410c','#9333ea','#059669','#be123c'];
  const datasets = [];

  brokers.forEach((broker, i) => {
    const brokerEntries = items.filter(e => (e.broker || '미지정') === broker);
    const dateTPMap = {};
    brokerEntries.forEach(e => { dateTPMap[e.date] = e.tp; });
    const dataArr = allDates.map(d => dateTPMap[d] !== undefined ? dateTPMap[d] : null);

    datasets.push({
      label: broker,
      data: dataArr,
      borderColor: palette[i % palette.length],
      backgroundColor: palette[i % palette.length] + '18',
      borderWidth: 2.5,
      pointRadius: dataArr.map(v => v !== null ? 5 : 0),
      pointHoverRadius: 7,
      pointBackgroundColor: palette[i % palette.length],
      pointBorderColor: '#ffffff',
      pointBorderWidth: 2,
      stepped: 'before',
      spanGaps: false,
      fill: false
    });
  });

  // Consensus average — solid thin line (no dash)
  if (items.length > 1) {
    const avgArr = allDates.map(d => {
      const vals = items.filter(e => e.date === d).map(e => e.tp);
      return vals.length > 0 ? Math.round(vals.reduce((a,b)=>a+b,0)/vals.length) : null;
    });
    let lastAvg = null;
    const filledAvg = avgArr.map(v => { if (v !== null) lastAvg = v; return lastAvg; });

    datasets.push({
      label: '컨센 평균',
      data: filledAvg,
      borderColor: '#d97706',
      borderWidth: 1.5,
      pointRadius: avgArr.map(v => v !== null ? 2 : 0),
      pointBackgroundColor: '#d97706',
      stepped: 'before',
      fill: false
    });
  }

  // My target price
  const myTP = myTargets[activeStock];
  if (myTP) {
    datasets.push({
      label: '★ 내 목표주가',
      data: allDates.map(() => myTP),
      borderColor: '#e11d48',
      borderWidth: 2.5,
      pointRadius: 0,
      pointHoverRadius: 0,
      stepped: false,
      fill: false,
      order: -1
    });
  }

  const ctx = document.getElementById('mainChart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      scales: {
        x: {
          grid: { color: 'rgba(0,0,0,.05)' },
          ticks: { color: '#7c7c8a', font: { size: 11 }, maxRotation: 45 }
        },
        y: {
          grid: { color: 'rgba(0,0,0,.05)' },
          ticks: {
            color: '#7c7c8a',
            font: { size: 11 },
            callback: v => v >= 10000 ? (v/10000).toFixed(v % 10000 === 0 ? 0 : 1) + '만' : v.toLocaleString()
          }
        }
      },
      plugins: {
        legend: {
          labels: { color: '#7c7c8a', font: { size: 12 }, usePointStyle: true, padding: 16 }
        },
        tooltip: {
          backgroundColor: '#ffffff',
          borderColor: '#e0e0e6',
          borderWidth: 1,
          titleColor: '#1a1a2e',
          bodyColor: '#1a1a2e',
          bodyFont: { weight: '600' },
          callbacks: {
            title: (tooltipItems) => allDates[tooltipItems[0].dataIndex] || '',
            label: ctx => {
              if (ctx.parsed.y === null) return null;
              return `${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString()}원`;
            }
          }
        }
      }
    }
  });
}

function esc(s) { return s.replace(/'/g, "\\'"); }

function updateSuggestions() {
  document.getElementById('dl_stocks').innerHTML = [...new Set(entries.map(e => e.stock))].map(s => `<option value="${s}">`).join('');
  document.getElementById('dl_brokers').innerHTML = [...new Set(entries.map(e => e.broker).filter(Boolean))].map(b => `<option value="${b}">`).join('');
}

function exportJSON() {
  const payload = { entries, myTargets, saved: new Date().toISOString() };
  dl(JSON.stringify(payload, null, 2), 'tp-tracker.json', 'application/json');
}
function importJSON(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = () => {
    try {
      const p = JSON.parse(r.result);
      if (p.entries) entries = p.entries;
      if (p.myTargets) myTargets = p.myTargets;
      updateSuggestions();
      activeStock = getStocks()[0] || null;
      render();
    } catch(err) { alert('파일 오류: ' + err.message); }
  };
  r.readAsText(f);
  e.target.value = '';
}
function exportCSV() {
  if (!entries.length) { alert('데이터 없음'); return; }
  let csv = '종목,날짜,증권사,목표주가,출처\n';
  entries.forEach(e => { csv += `${e.stock},${e.date},${e.broker},${e.tp},"${(e.source||'').replace(/"/g,'""')}"\n`; });
  dl(csv, 'tp-tracker.csv', 'text/csv');
}
function dl(content, name, type) {
  const b = new Blob([content], {type: type+';charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(b); a.download = name; a.click();
  URL.revokeObjectURL(a.href);
}

document.getElementById('inDate').value = new Date().toISOString().slice(0, 10);
document.querySelector('.add-form').addEventListener('keydown', e => { if (e.key === 'Enter') addEntry(); });

// ── Pre-loaded: 삼성전자 ──
(function() {
  const d = [
    { date:'2025-10-13', broker:'상상인증권', tp:110000, source:'https://www.opinionnews.co.kr/news/articleView.html?idxno=129691' },
    { date:'2025-10-31', broker:'KB증권', tp:160000, source:'https://kbthink.com/securities-view.html?docId=20251030162833360K' },
    { date:'2025-11-25', broker:'한국투자증권', tp:160000, source:'https://www.hankyung.com/article/202511253209i' },
    { date:'2025-12-17', broker:'하나증권', tp:155000, source:'https://www.g-enews.com/article/Securities/2025/12/20251217082439598244093b5d4e_1' },
