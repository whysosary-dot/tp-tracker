<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>목표주가 트래커</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #f5f5f7;
    --surface: #ffffff;
    --surface2: #f0f0f3;
    --border: #e0e0e6;
    --text: #1a1a2e;
    --dim: #7c7c8a;
    --accent: #6366f1;
    --accent2: #818cf8;
    --my-line: #e11d48;
    --con-avg: #d97706;
    --safe-b: env(safe-area-inset-bottom, 0px);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Inter', sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; flex-direction: column; height: 100vh; height: 100dvh;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── Top bar ── */
  .topbar {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 24px;
    background: var(--surface); border-bottom: 1px solid var(--border);
    box-shadow: 0 1px 3px rgba(0,0,0,.04);
    flex-shrink: 0; z-index: 20;
  }
  .topbar h1 {
    font-size: 17px; font-weight: 700;
    background: linear-gradient(135deg, #6366f1, #a855f7);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-right: auto;
  }

  /* IO buttons + mobile menu */
  .io-btns { display: flex; gap: 6px; }
  .menu-toggle {
    display: none; width: 36px; height: 36px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--dim); font-size: 18px; cursor: pointer;
    align-items: center; justify-content: center;
  }
  .io-dropdown {
    display: none; position: absolute; top: 100%; right: 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 6px; min-width: 150px;
    box-shadow: 0 8px 24px rgba(0,0,0,.12); z-index: 100;
  }
  .io-dropdown.open { display: flex; flex-direction: column; }
  .io-dropdown .btn { text-align: left; border: none; padding: 10px 12px; border-radius: 6px; font-size: 13px; }
  .topbar-right { position: relative; display: flex; gap: 6px; align-items: center; }

  /* ── Inputs ── */
  input, select {
    padding: 7px 10px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text); font-size: 13px; outline: none;
    -webkit-appearance: none;
  }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(99,102,241,.12); }
  .btn {
    padding: 7px 14px; border-radius: 6px; font-size: 12px; font-weight: 600;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text); cursor: pointer; white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent); background: rgba(99,102,241,.06); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); }

  /* ── Desktop Layout ── */
  .body { display: flex; flex: 1; overflow: hidden; }

  /* ── Sidebar ── */
  .sidebar {
    width: 320px; min-width: 320px;
    background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .sidebar-header {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    font-size: 13px; font-weight: 600; color: var(--dim);
    display: flex; align-items: center; justify-content: space-between;
  }
  .sidebar-close { display: none; }
  .entry-list { flex: 1; overflow-y: auto; padding: 8px; -webkit-overflow-scrolling: touch; }
  .entry-item {
    display: flex; align-items: flex-start; justify-content: space-between;
    padding: 8px 10px; border-radius: 6px; font-size: 13px;
    margin-bottom: 2px; transition: background .12s;
  }
  .entry-item:hover { background: var(--surface2); }
  .entry-left { display: flex; flex-direction: column; gap: 1px; flex: 1; min-width: 0; }
  .entry-date { font-size: 11px; color: var(--dim); }
  .entry-source {
    font-size: 10px; color: var(--accent); opacity: .7;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    max-width: 180px;
  }
  .entry-source a { color: var(--accent); text-decoration: none; }
  .entry-source a:hover { text-decoration: underline; opacity: 1; }
  .entry-tp { font-weight: 700; font-size: 14px; white-space: nowrap; color: var(--text); }
  .del-btn {
    background: none; border: none; color: var(--dim);
    cursor: pointer; font-size: 16px; padding: 4px 6px; border-radius: 4px;
  }
  .del-btn:hover { color: #e11d48; background: rgba(225,29,72,.08); }
  .entry-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

  /* Add form */
  .add-form {
    padding: 12px; border-top: 1px solid var(--border);
    background: var(--surface2); flex-shrink: 0;
  }
  .add-row { display: flex; gap: 6px; margin-bottom: 6px; }
  .add-row input, .add-row select { flex: 1; min-width: 0; }

  /* ── Chart area ── */
  .chart-area {
    flex: 1; display: flex; flex-direction: column; padding: 20px 24px;
    overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch;
  }
  .chart-wrap {
    flex: 1; position: relative; min-height: 520px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,.04);
  }
  .chart-inner { position: relative; width: 100%; height: 100%; }

  /* My price bar */
  .my-price-bar {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 16px; padding: 12px 16px;
    background: #fff0f3; border: 1px solid var(--my-line);
    border-radius: 10px; flex-wrap: wrap;
  }
  .my-price-bar label {
    font-size: 13px; font-weight: 600; color: var(--my-line);
    white-space: nowrap;
  }
  .my-price-bar input {
    width: 140px; border-color: var(--my-line);
    font-weight: 700; font-size: 15px; color: var(--my-line);
    background: #fff5f7;
  }
  .my-price-bar .gap-info {
    font-size: 13px; color: var(--dim); margin-left: auto;
  }
  .gap-info .up { color: #e11d48; font-weight: 700; }
  .gap-info .down { color: #2563eb; font-weight: 700; }
  .gap-info .even { color: var(--dim); font-weight: 700; }

  /* Stats row */
  .stats-row { display: flex; gap: 12px; margin-bottom: 16px; }
  .stat-card {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px;
    box-shadow: 0 1px 3px rgba(0,0,0,.03);
  }
  .stat-label { font-size: 11px; color: var(--dim); margin-bottom: 2px; }
  .stat-value { font-size: 20px; font-weight: 700; color: var(--text); }
  .stat-sub { font-size: 11px; color: var(--dim); margin-top: 2px; }

  /* Empty */
  .empty {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100%; color: var(--dim);
    text-align: center; font-size: 14px; line-height: 1.7;
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: .4; }

  /* Stock tabs */
  .stock-tabs {
    display: flex; gap: 6px; margin-bottom: 16px;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: none; flex-shrink: 0;
    padding-bottom: 2px;
  }
  .stock-tabs::-webkit-scrollbar { display: none; }
  .stock-tab {
    padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--dim); cursor: pointer; transition: all .12s;
    white-space: nowrap; flex-shrink: 0;
  }
  .stock-tab:hover { border-color: var(--accent); color: var(--text); }
  .stock-tab.active {
    background: var(--accent); border-color: var(--accent); color: #fff;
  }
  .stock-tab .x { margin-left: 4px; font-size: 11px; opacity: .6; }
  .stock-tab .x:hover { opacity: 1; }

  /* Mobile FAB (리포트 목록 토글) */
  .fab {
    display: none; position: fixed; z-index: 50;
    bottom: 20px; right: 20px;
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--accent); color: #fff; border: none;
    font-size: 22px; cursor: pointer;
    box-shadow: 0 4px 16px rgba(99,102,241,.4);
    align-items: center; justify-content: center;
    transition: transform .2s;
  }
  .fab:active { transform: scale(.92); }
  .fab .badge {
    position: absolute; top: -2px; right: -2px;
    background: var(--my-line); color: #fff;
    font-size: 10px; font-weight: 700;
    min-width: 18px; height: 18px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    padding: 0 4px;
  }

  /* Mobile overlay backdrop */
  .drawer-backdrop {
    display: none; position: fixed; inset: 0; z-index: 90;
    background: rgba(0,0,0,.35); opacity: 0;
    transition: opacity .25s;
  }
  .drawer-backdrop.open { display: block; opacity: 1; }

  /* ── Update Log Panel ── */
  .update-btn {
    padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 600;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--dim); cursor: pointer; white-space: nowrap;
    display: flex; align-items: center; gap: 5px;
    transition: all .15s;
  }
  .update-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(99,102,241,.06); }
  .update-btn .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #22c55e; flex-shrink: 0;
    animation: pulse-dot 2s infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: .4; }
  }
  .update-panel {
    display: none; position: absolute; top: 100%; right: 0; margin-top: 6px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 0; min-width: 360px; max-width: 420px;
    box-shadow: 0 12px 36px rgba(0,0,0,.12); z-index: 200;
    max-height: 70vh; overflow: hidden;
    animation: slideDown .18s ease-out;
  }
  @keyframes slideDown { from { opacity:0; transform: translateY(-8px); } to { opacity:1; transform: translateY(0); } }
  .update-panel.open { display: block; }
  .update-panel-header {
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(135deg, rgba(99,102,241,.06), rgba(168,85,247,.06));
  }
  .update-panel-header h3 {
    font-size: 14px; font-weight: 700; color: var(--text);
    display: flex; align-items: center; gap: 6px;
  }
  .update-panel-header .updated-at { font-size: 11px; color: var(--dim); font-weight: 400; }
  .update-panel-body { overflow-y: auto; max-height: calc(70vh - 50px); padding: 8px; }
  .update-group { margin-bottom: 8px; }
  .update-group-title {
    font-size: 11px; font-weight: 700; color: var(--accent);
    padding: 6px 10px 4px; display: flex; align-items: center; gap: 6px;
  }
  .update-group-title .count {
    font-size: 10px; background: var(--accent); color: #fff;
    padding: 1px 6px; border-radius: 8px; font-weight: 600;
  }
  .update-entry {
    display: flex; align-items: center; padding: 8px 10px; border-radius: 8px;
    font-size: 13px; cursor: pointer; transition: background .12s; gap: 8px;
  }
  .update-entry:hover { background: var(--surface2); }
  .update-entry .stock-badge {
    font-size: 11px; font-weight: 600; color: var(--accent);
    background: rgba(99,102,241,.08); padding: 2px 8px; border-radius: 6px;
    white-space: nowrap; flex-shrink: 0;
  }
  .update-entry .broker-date {
    font-size: 12px; color: var(--dim); flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .update-entry .tp-value {
    font-size: 13px; font-weight: 700; color: var(--text); white-space: nowrap;
  }
  .update-empty {
    text-align: center; padding: 24px 16px; color: var(--dim); font-size: 13px;
  }

  /* ── Consensus Chart ── */
  .consensus-wrap {
    margin-top: 16px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 12px;
    padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.04);
  }
  .consensus-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .consensus-header h3 {
    font-size: 14px; font-weight: 700; color: var(--text);
    display: flex; align-items: center; gap: 6px;
  }
  .consensus-header .unit-label {
    font-size: 11px; color: var(--dim); font-weight: 400;
  }
  .consensus-inner { position: relative; width: 100%; height: 220px; }
  .consensus-empty {
    display: flex; align-items: center; justify-content: center;
    height: 100%; color: var(--dim); font-size: 13px;
  }
  @media (max-width: 767px) {
    .consensus-wrap { padding: 12px; margin-top: 12px; }
    .consensus-inner { height: 180px; }
    .consensus-header h3 { font-size: 13px; }
  }

  /* ── Consensus Estimate Stats Cards ── */
  .con-stats-wrap {
    margin-bottom: 16px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 12px;
    padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.04);
  }
  .con-stats-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px; flex-wrap: wrap; gap: 8px;
  }
  .con-stats-header h3 {
    font-size: 14px; font-weight: 700; color: var(--text);
    display: flex; align-items: center; gap: 6px;
  }
  .con-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
  .con-tab {
    padding: 4px 12px; border-radius: 16px; font-size: 11px; font-weight: 600;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--dim); cursor: pointer; transition: all .12s;
  }
  .con-tab:hover { border-color: var(--accent); color: var(--text); }
  .con-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .con-group-label {
    font-size: 12px; font-weight: 600; color: var(--dim);
    margin-bottom: 6px; margin-top: 12px;
    display: flex; align-items: center; gap: 6px;
  }
  .con-group-label:first-child { margin-top: 0; }
  .con-group-label .dot-rev { width: 8px; height: 8px; border-radius: 50%; background: #6366f1; }
  .con-group-label .dot-op { width: 8px; height: 8px; border-radius: 50%; background: #ea580c; }
  .con-no-data {
    text-align: center; padding: 16px; color: var(--dim); font-size: 12px;
  }
  @media (max-width: 767px) {
    .con-stats-wrap { padding: 12px; margin-bottom: 12px; }
    .con-stats-header { margin-bottom: 10px; }
    .con-stats-header h3 { font-size: 13px; }
    .con-tab { padding: 4px 10px; font-size: 10px; }
  }

  /* ── Quarterly Consensus Table ── */
  .con-table-wrap {
    margin-top: 16px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 12px;
    padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.04);
  }
  .con-table-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px; flex-wrap: wrap; gap: 8px;
  }
  .con-table-header h3 {
    font-size: 14px; font-weight: 700; color: var(--text);
  }
  .con-table-tabs { display: flex; gap: 4px; }
  .con-table-tab {
    padding: 4px 12px; border-radius: 16px; font-size: 11px; font-weight: 600;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--dim); cursor: pointer; transition: all .12s;
  }
  .con-table-tab:hover { border-color: var(--accent); color: var(--text); }
  .con-table-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .con-table {
    width: 100%; border-collapse: collapse; font-size: 13px;
  }
  .con-table thead th {
    padding: 8px 10px; text-align: left; font-size: 11px; font-weight: 600;
    color: var(--dim); border-bottom: 2px solid var(--border);
    white-space: nowrap;
  }
  .con-table tbody td {
    padding: 8px 10px; border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .con-table tbody tr:last-child td { border-bottom: none; }
  .con-table tbody tr:hover { background: var(--surface2); }
  .con-table .col-date { color: var(--dim); font-size: 12px; }
  .con-table .col-broker { font-weight: 600; }
  .con-table .col-num { text-align: right; font-variant-numeric: tabular-nums; }
  .con-table .col-rev { color: #6366f1; font-weight: 600; }
  .con-table .col-op { color: #ea580c; font-weight: 600; }
  .con-table-summary {
    display: flex; gap: 16px; margin-top: 12px; padding: 10px 12px;
    background: var(--surface2); border-radius: 8px; font-size: 12px;
    flex-wrap: wrap;
  }
  .con-table-summary .sum-item { display: flex; gap: 4px; align-items: center; }
  .con-table-summary .sum-label { color: var(--dim); }
  .con-table-summary .sum-val { font-weight: 700; }
  .con-table-summary .sum-rev { color: #6366f1; }
  .con-table-summary .sum-op { color: #ea580c; }
  .con-table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  @media (max-width: 767px) {
    .con-table-wrap { padding: 12px; margin-top: 12px; }
    .con-table-header h3 { font-size: 13px; }
    .con-table { font-size: 12px; }
    .con-table thead th, .con-table tbody td { padding: 6px 8px; }
    .con-table-tab { padding: 4px 10px; font-size: 10px; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #d0d0d8; border-radius: 3px; }

  /* ═══════════════════════════════════════
     MOBILE PORTRAIT (< 768px)
     ═══════════════════════════════════════ */
  @media (max-width: 767px) {
    .topbar { padding: 10px 16px; gap: 8px; }
    .topbar h1 { font-size: 15px; }
    .io-btns { display: none; }
    .menu-toggle { display: flex; }
    .update-panel { min-width: 0; width: calc(100vw - 32px); right: -8px; max-width: none; }
    .update-btn span.lbl { display: none; }

    .body { flex-direction: column; }

    /* Sidebar → bottom drawer */
    .sidebar {
      position: fixed; bottom: 0; left: 0; right: 0;
      width: 100%; min-width: 0;
      height: 70vh; max-height: 70vh;
      border-right: none; border-top: 1px solid var(--border);
      border-radius: 16px 16px 0 0;
      box-shadow: 0 -4px 24px rgba(0,0,0,.12);
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.32,.72,0,1);
      z-index: 100;
      padding-bottom: var(--safe-b);
    }
    .sidebar.open { transform: translateY(0); }
    .sidebar-header {
      padding: 14px 16px; cursor: grab;
      display: flex; align-items: center;
    }
    .sidebar-close {
      display: flex; width: 32px; height: 32px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--surface2);
      color: var(--dim); font-size: 18px; cursor: pointer;
      align-items: center; justify-content: center; margin-left: auto;
    }
    .sidebar-handle {
      display: block; width: 36px; height: 4px; border-radius: 2px;
      background: #ccc; margin: -6px auto 8px;
    }

    .fab { display: flex; bottom: calc(20px + var(--safe-b)); }

    /* Chart area */
    .chart-area { padding: 14px 16px; overflow-y: auto; }
    .chart-wrap { min-height: 420px; padding: 12px; }

    /* Stats 2x2 grid */
    .stats-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
      margin-bottom: 12px;
    }
    .stat-card { padding: 10px 12px; }
    .stat-value { font-size: 17px; }
    .stat-label { font-size: 10px; }

    /* My price bar compact */
    .my-price-bar {
      padding: 10px 12px; gap: 8px; margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .my-price-bar label { font-size: 12px; }
    .my-price-bar input { width: 120px; font-size: 14px; }
    .my-price-bar .gap-info { font-size: 12px; width: 100%; text-align: right; margin-top: 2px; }

    /* Stock tabs scroll */
    .stock-tabs { margin-bottom: 12px; gap: 6px; }
    .stock-tab { padding: 7px 12px; font-size: 12px; }

    /* Add form */
    .add-form { padding: 10px 12px; }
    .add-row { gap: 4px; margin-bottom: 4px; }
    .add-row input { font-size: 13px; padding: 8px 8px; }

    /* Entry list touch */
    .entry-item { padding: 10px 10px; }
    .del-btn { padding: 8px 10px; font-size: 18px; }
  }

  /* ═══════════════════════════════════════
     MOBILE LANDSCAPE (short height + wide)
     ═══════════════════════════════════════ */
  @media (max-height: 500px) and (min-width: 568px) {
    .topbar { padding: 6px 16px; }
    .topbar h1 { font-size: 14px; }

    .chart-area { padding: 8px 12px; }
    .chart-wrap { min-height: 180px; padding: 8px; }

    /* Compact stats: single row, smaller */
    .stats-row { gap: 6px; margin-bottom: 8px; }
    .stat-card { padding: 6px 8px; border-radius: 6px; }
    .stat-value { font-size: 15px; }
    .stat-label { font-size: 9px; }
    .stat-sub { font-size: 9px; }

    .my-price-bar { padding: 6px 10px; margin-bottom: 8px; gap: 8px; }
    .my-price-bar label { font-size: 11px; }
    .my-price-bar input { width: 110px; font-size: 13px; padding: 4px 8px; }
    .my-price-bar .gap-info { font-size: 11px; }

    .stock-tabs { margin-bottom: 8px; }
    .stock-tab { padding: 4px 10px; font-size: 11px; }

    /* Sidebar: narrower in landscape */
    .sidebar { width: 260px; min-width: 260px; }
  }

  /* ═══════════════════════════════════════
     TABLET (768px – 1024px)
     ═══════════════════════════════════════ */
  @media (min-width: 768px) and (max-width: 1024px) {
    .sidebar { width: 280px; min-width: 280px; }
    .chart-area { padding: 16px; }
    .stats-row { gap: 8px; }
    .stat-value { font-size: 18px; }
  }

  /* Mobile landscape sidebar also as drawer */
  @media (max-width: 767px) and (orientation: landscape) {
    .sidebar {
      position: fixed; right: 0; top: 0; bottom: 0;
      left: auto; width: 300px; height: 100%;
      max-height: 100%; border-radius: 0;
      border-top: none; border-left: 1px solid var(--border);
      transform: translateX(100%);
      box-shadow: -4px 0 24px rgba(0,0,0,.12);
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-handle { display: none; }

    .chart-area { padding: 8px 12px; }
    .chart-wrap { min-height: 200px; padding: 10px; }
    .stats-row {
      display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px;
      margin-bottom: 8px;
    }
    .stat-card { padding: 6px 8px; }
    .stat-value { font-size: 14px; }
    .stat-label { font-size: 9px; }
    .my-price-bar { padding: 6px 10px; margin-bottom: 8px; }
    .my-price-bar .gap-info { width: auto; }
    .stock-tabs { margin-bottom: 8px; }
    .stock-tab { padding: 5px 10px; font-size: 11px; }
  }
</style>
</head>
<body>

  <div class="topbar-right">
    <button class="update-btn" id="updateLogBtn" onclick="toggleUpdatePanel(event)">
      <span class="dot"></span><span class="lbl">업데이트 내역</span>

    <div class="update-panel" id="updatePanel">

<div class="body">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-handle" id="sidebarHandle"></div>
    <div class="sidebar-header">
      <span>리포트 목록</span>
      <span id="entryCount" style="font-weight:400">0건</span>
      <button class="sidebar-close" onclick="closeDrawer()" aria-label="닫기">&times;</button>
    </div>
    <div class="entry-list" id="entryList">
      <div class="empty" style="height:200px">
        <div class="empty-icon">📋</div>
        아래에서 데이터를 추가하세요
      </div>
    </div>
    <div class="add-form">
      <div class="add-row">
        <input type="text" id="inStock" placeholder="종목명" list="dl_stocks" style="flex:1.2">
        <datalist id="dl_stocks"></datalist>
        <input type="date" id="inDate" style="flex:1">

      <div class="add-row">
        <input type="text" id="inBroker" placeholder="증권사" list="dl_brokers">
        <datalist id="dl_brokers"></datalist>
        <input type="number" id="inTP" placeholder="목표주가 (원)">

  <div class="drawer-backdrop" id="backdrop" onclick="closeDrawer()"></div>

  <div class="chart-area" id="chartArea">

      종목 데이터를 입력하면<br>목표주가 계단식 차트가 그려집니다.
    </div>

    <div id="dashWrap" style="display:none">
      <div class="stock-tabs" id="stockTabs"></div>

      <div class="my-price-bar">
        <label>★ 내 목표주가</label>
        <input type="text" id="myTP" placeholder="0" oninput="onMyTPChange()" inputmode="numeric">
        <div class="gap-info" id="gapInfo"></div>
      </div>

      <div class="stats-row" id="statsRow"></div>

      <div id="conStatsWrap" class="con-stats-wrap" style="display:none">
        <div class="con-stats-header">
          <h3>📊 실적 추정 컨센서스</h3>
          <div class="con-tabs" id="conTabs"></div>
        </div>
        <div id="conStatsBody"></div>
      </div>

      <div class="con-table-wrap" id="conTableWrap" style="display:none">
        <div class="con-table-header">
          <h3>📋 분기별 실적 컨센서스</h3>
          <div class="con-table-tabs" id="conTableTabs"></div>
        </div>
        <div class="con-table-body" id="conTableBody"></div>
      </div>

      <div class="chart-wrap">
        <div class="chart-inner"><canvas id="mainChart"></canvas></div>
      </div>

      <div class="consensus-wrap" id="consensusWrap" style="display:none">
        <div class="consensus-header">
          <h3>📊 컨센서스 실적 추이 (연간)</h3>
          <span class="unit-label" id="consensusUnit"></span>

        <div class="consensus-inner"><canvas id="consensusChart"></canvas></div>

<!-- Mobile FAB -->
<button class="fab" id="fab" onclick="openDrawer()" aria-label="리포트 목록">
  📋<span class="badge" id="fabBadge">0</span>
</button>

<script>
let entries = [];
let myTargets = {};
try { const s = localStorage.getItem('tp-myTargets'); if (s) myTargets = JSON.parse(s); } catch(e) {}
let activeStock = null;
let chart = null;
let conChart = null;
let activeConTab = 'annual';
let activeQTab = '1q';

// ── Stock Metadata (단위 등) ──
// entries 각 항목에 estYear, revenue, op 필드가 있으면 컨센서스 차트에 표시
// revenue/op 단위는 stockMeta.unit을 따름
const stockMeta = {
  '삼성전자': { unit:'조원' },
  'SK하이닉스': { unit:'조원' },
  'HD한국조선해양': { unit:'조원' },
  '시프트업': { unit:'억원' },
  '한화엔진': { unit:'억원' },
  'SAMG엔터': { unit:'억원' },
  '네오위즈': { unit:'억원' },
  'DN오토모티브': { unit:'억원' },
  '와이지-원': { unit:'억원' },
  '한라IMS': { unit:'억원' },
  '엠앤씨솔루션': { unit:'억원' },
};

function saveMyTargets() { try { localStorage.setItem('tp-myTargets', JSON.stringify(myTargets)); } catch(e) {} }

/* ── Mobile drawer ── */
function isMobile() { return window.innerWidth < 768; }
function openDrawer() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('backdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeDrawer() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('backdrop').classList.remove('open');
  document.body.style.overflow = '';
}
function toggleMenu(e) {
  e.stopPropagation();
  document.getElementById('ioDropdown').classList.toggle('open');
}
function closeMenu() { document.getElementById('ioDropdown').classList.remove('open'); }
document.addEventListener('click', () => closeMenu());

/* Swipe-to-close for bottom drawer */
(function() {
  const sidebar = document.getElementById('sidebar');
  const handle = document.getElementById('sidebarHandle');
  let startY = 0, currentY = 0, dragging = false;
  function onStart(e) {
    if (!isMobile()) return;
    dragging = true;
    startY = e.touches ? e.touches[0].clientY : e.clientY;
    sidebar.style.transition = 'none';
  }
  function onMove(e) {
    if (!dragging) return;
    currentY = (e.touches ? e.touches[0].clientY : e.clientY);
    const dy = currentY - startY;
    if (dy > 0) {
      const isPortrait = window.matchMedia('(orientation: portrait)').matches;
      if (isPortrait) {
        sidebar.style.transform = `translateY(${dy}px)`;
      } else {
        sidebar.style.transform = `translateX(${dy}px)`;
      }
    }
  }
  function onEnd() {
    if (!dragging) return;
    dragging = false;
    sidebar.style.transition = '';
    const dy = currentY - startY;
    if (dy > 80) { closeDrawer(); }
    sidebar.style.transform = '';
  }
  handle.addEventListener('touchstart', onStart, {passive:true});
  handle.addEventListener('touchmove', onMove, {passive:true});
  handle.addEventListener('touchend', onEnd);
  // Also from sidebar header
  const header = sidebar.querySelector('.sidebar-header');
  header.addEventListener('touchstart', onStart, {passive:true});
  header.addEventListener('touchmove', onMove, {passive:true});
  header.addEventListener('touchend', onEnd);
})();

/* ── Core logic ── */
function addEntry() {
  const stock = document.getElementById('inStock').value.trim();
  const date = document.getElementById('inDate').value;
  const broker = document.getElementById('inBroker').value.trim();
  const tp = parseFloat(document.getElementById('inTP').value);
  const source = document.getElementById('inSource').value.trim();
  if (!stock || !date || !tp) { alert('종목명, 날짜, 목표주가는 필수입니다.'); return; }
  entries.push({ id: Date.now() + Math.random(), stock, date, broker, tp, source });
  entries.sort((a,b) => a.date.localeCompare(b.date));
  updateSuggestions();
  selectStock(stock);
  clearInputs();
}

function removeEntry(id) {
  entries = entries.filter(e => e.id !== id);
  render();
}

function clearInputs() {
  document.getElementById('inBroker').value = '';
  document.getElementById('inTP').value = '';
  document.getElementById('inSource').value = '';
}

function getStocks() { return [...new Set(entries.map(e => e.stock))]; }

function selectStock(name) { activeStock = name; render(); }

function removeStock(name) {
  entries = entries.filter(e => e.stock !== name);
  delete myTargets[name]; saveMyTargets();
  if (activeStock === name) activeStock = getStocks()[0] || null;
  render();
}

function fmtComma(n) { return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ','); }

function onMyTPChange() {
  if (!activeStock) return;
  const el = document.getElementById('myTP');
  const digits = el.value.replace(/[^0-9]/g, '');
  const num = parseInt(digits, 10) || null;
  myTargets[activeStock] = num;
  saveMyTargets();
  if (digits) {
    const posBefore = el.selectionStart;
    const digitsBefore = el.value.slice(0, posBefore).replace(/[^0-9]/g, '').length;
    el.value = fmtComma(parseInt(digits, 10));
    let cnt = 0, newPos = el.value.length;
    for (let i = 0; i < el.value.length; i++) {
      if (el.value[i] !== ',') cnt++;
      if (cnt === digitsBefore) { newPos = i + 1; break; }
    }
    el.setSelectionRange(newPos, newPos);
  }
  renderChart(entries.filter(e => e.stock === activeStock).sort((a,b) => a.date.localeCompare(b.date)));
  renderGap(entries.filter(e => e.stock === activeStock).sort((a,b) => a.date.localeCompare(b.date)));
}

function render() {
  const stocks = getStocks();
  // Update FAB badge
  const badge = document.getElementById('fabBadge');
  if (badge) badge.textContent = entries.filter(e => e.stock === activeStock).length;

  if (stocks.length === 0) {
    document.getElementById('emptyMain').style.display = 'flex';
    document.getElementById('dashWrap').style.display = 'none';
    document.getElementById('entryList').innerHTML = '<div class="empty" style="height:200px"><div class="empty-icon">📋</div>아래에서 데이터를 추가하세요</div>';
    document.getElementById('entryCount').textContent = '0건';
    return;
  }
  document.getElementById('emptyMain').style.display = 'none';
  document.getElementById('dashWrap').style.display = 'block';
  if (!activeStock || !stocks.includes(activeStock)) activeStock = stocks[0];

  document.getElementById('stockTabs').innerHTML = stocks.map(s =>
    `<div class="stock-tab ${s === activeStock ? 'active' : ''}" onclick="selectStock('${esc(s)}')">
      ${s}<span class="x" onclick="event.stopPropagation();removeStock('${esc(s)}')">&times;</span>
    </div>`
  ).join('');

  document.getElementById('myTP').value = myTargets[activeStock] ? fmtComma(myTargets[activeStock]) : '';
  const items = entries.filter(e => e.stock === activeStock).sort((a,b) => a.date.localeCompare(b.date));

  document.getElementById('entryCount').textContent = entries.length + '건';
  if (badge) badge.textContent = items.length;

  const listItems = entries.filter(e => e.stock === activeStock).sort((a,b) => b.date.localeCompare(a.date));
  document.getElementById('entryList').innerHTML = listItems.map(e => {
    let srcHtml = '';
    if (e.source) {
      if (e.source.startsWith('http')) {
        let domain = '';
        try { domain = new URL(e.source).hostname.replace('www.',''); } catch(_) { domain = e.source; }
        srcHtml = `<span class="entry-source"><a href="${e.source}" target="_blank" title="${e.source}">${domain}</a></span>`;
      } else {
        srcHtml = `<span class="entry-source" title="${e.source}">${e.source}</span>`;
      }
    }
    return `
    <div class="entry-item">
      <div class="entry-left">
        <span class="entry-date">${e.date}${e.broker ? ' · ' + e.broker : ''}</span>
        ${srcHtml}
      </div>
      <div class="entry-right">
        <span class="entry-tp">${e.tp.toLocaleString()}원</span>
        <button class="del-btn" onclick="removeEntry(${e.id})">&times;</button>
      </div>
    </div>`;
  }).join('');

  renderStats(items);
  renderConStats();
  renderChart(items);
  renderGap(items);
  renderConsensusChart();
  renderConTable();
}

function renderStats(items) {
  if (items.length === 0) { document.getElementById('statsRow').innerHTML = ''; return; }
  const tps = items.map(e => e.tp);
  const avg = Math.round(tps.reduce((a,b) => a+b, 0) / tps.length);
  const max = Math.max(...tps);
  const min = Math.min(...tps);
  const latest = tps[tps.length - 1];
  const brokers = [...new Set(items.map(e => e.broker).filter(Boolean))].length;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-label">컨센서스 평균</div><div class="stat-value">${avg.toLocaleString()}</div><div class="stat-sub">${items.length}건 · ${brokers}개 증권사</div></div>
    <div class="stat-card"><div class="stat-label">최고</div><div class="stat-value">${max.toLocaleString()}</div></div>
    <div class="stat-card"><div class="stat-label">최저</div><div class="stat-value">${min.toLocaleString()}</div></div>
    <div class="stat-card"><div class="stat-label">최신</div><div class="stat-value">${latest.toLocaleString()}</div><div class="stat-sub">${items[items.length-1].date}</div></div>
  `;
}

function renderGap(items) {
  const myTP = myTargets[activeStock];
  const info = document.getElementById('gapInfo');
  if (!myTP || items.length === 0) { info.innerHTML = ''; return; }
  const latest = items[items.length - 1].tp;
  const diff = ((myTP - latest) / latest * 100).toFixed(1);
  let cls = 'even', sign = '';
  if (diff > 0) { cls = 'up'; sign = '+'; }
  else if (diff < 0) { cls = 'down'; }
  info.innerHTML = `최신 컨센 대비 <span class="${cls}">${sign}${diff}%</span>`;
}

// ── Chart ──
function renderChart(items) {
  if (chart) chart.destroy();
  if (items.length === 0) return;

  const allDates = [...new Set(items.map(e => e.date))].sort();
  const labels = allDates.map(d => { const p = d.split('-'); return p[1] + '/' + p[2]; });

  const brokers = [...new Set(items.map(e => e.broker || '미지정'))];
  const palette = ['#6366f1','#16a34a','#ea580c','#0891b2','#db2777','#dc2626','#7c3aed','#0d9488','#c2410c','#9333ea','#059669','#be123c'];
  const datasets = [];
  const mob = isMobile();

  brokers.forEach((broker, i) => {
    const brokerEntries = items.filter(e => (e.broker || '미지정') === broker);
    const dateTPMap = {};
    brokerEntries.forEach(e => { dateTPMap[e.date] = e.tp; });
    const dataArr = allDates.map(d => dateTPMap[d] !== undefined ? dateTPMap[d] : null);

    datasets.push({
      label: broker,
      data: dataArr,
      borderColor: palette[i % palette.length],
      backgroundColor: palette[i % palette.length] + '18',
      borderWidth: mob ? 2 : 2.5,
      pointRadius: dataArr.map(v => v !== null ? (mob ? 3.5 : 5) : 0),
      pointHoverRadius: mob ? 5 : 7,
      pointBackgroundColor: palette[i % palette.length],
      pointBorderColor: '#ffffff',
      pointBorderWidth: mob ? 1.5 : 2,
      stepped: 'before',
      spanGaps: false,
      fill: false
    });
  });

  // Consensus average
  if (items.length > 1) {
    const avgArr = allDates.map(d => {
      const vals = items.filter(e => e.date === d).map(e => e.tp);
      return vals.length > 0 ? Math.round(vals.reduce((a,b)=>a+b,0)/vals.length) : null;
    });
    let lastAvg = null;
    const filledAvg = avgArr.map(v => { if (v !== null) lastAvg = v; return lastAvg; });

    datasets.push({
      label: '컨센 평균',
      data: filledAvg,
      borderColor: '#d97706',
      borderWidth: 1.5,
      pointRadius: avgArr.map(v => v !== null ? (mob ? 1.5 : 2) : 0),
      pointBackgroundColor: '#d97706',
      stepped: 'before',
      fill: false
    });
  }

  // My target price
  const myTP = myTargets[activeStock];
  if (myTP) {
    datasets.push({
      label: '★ 내 목표주가',
      data: allDates.map(() => myTP),
      borderColor: '#e11d48',
      borderWidth: 2.5,
      pointRadius: 0,
      pointHoverRadius: 0,
      stepped: false,
      fill: false,
      order: -1
    });
  }

  // Compute Y-axis padding for target price chart
  const allTP = items.map(e => e.tp).filter(v => v != null);
  const tpMin = Math.min(...allTP);
  const tpMax = Math.max(...allTP);
  const tpRange = tpMax - tpMin || tpMax * 0.1;
  const yPadMin = Math.max(0, Math.floor((tpMin - tpRange * 0.2) / 1000) * 1000);
  const yPadMax = Math.ceil((tpMax + tpRange * 0.2) / 1000) * 1000;

  const ctx = document.getElementById('mainChart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      scales: {
        x: {
          grid: { color: 'rgba(0,0,0,.05)' },
          ticks: { color: '#7c7c8a', font: { size: mob ? 10 : 11 }, maxRotation: 45 }
        },
        y: {
          min: yPadMin,
          max: yPadMax,
          grid: { color: 'rgba(0,0,0,.05)' },
          ticks: {
            color: '#7c7c8a',
            font: { size: mob ? 10 : 11 },
            callback: v => v >= 10000 ? (v/10000).toFixed(v % 10000 === 0 ? 0 : 1) + '만' : v.toLocaleString()
          }
        }
      },
      plugins: {
        legend: {
          display: !mob || window.innerWidth > 400,
          labels: { color: '#7c7c8a', font: { size: mob ? 9 : 11 }, usePointStyle: true, padding: mob ? 6 : 10, boxWidth: mob ? 8 : 12 }
        },
        tooltip: {
          backgroundColor: '#ffffff',
          borderColor: '#e0e0e6',
          borderWidth: 1,
          titleColor: '#1a1a2e',
          bodyColor: '#1a1a2e',
          bodyFont: { weight: '600', size: mob ? 12 : 14 },
          callbacks: {
            title: (tooltipItems) => allDates[tooltipItems[0].dataIndex] || '',
            label: ctx => {
              if (ctx.parsed.y === null) return null;
              const line = `${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString()}원`;
              const brokerName = ctx.dataset.label;
              if (brokerName === '컨센 평균' || brokerName === '★ 내 목표주가') return line;
              const date = allDates[ctx.dataIndex];
              const entry = items.find(e => e.date === date && (e.broker || '미지정') === brokerName);
              if (!entry) return line;
              const meta = stockMeta[activeStock];
              if (!meta) return line;
              const lines = [line];
              const fmt = v => meta.unit === '조원' ? v.toFixed(1) : Math.round(v).toLocaleString();
              // Annual estimates
              if (entry.revenue != null || entry.op != null) {
                let annTxt = '  연간: ';
                const parts = [];
                if (entry.revenue != null) parts.push('매출 ' + fmt(entry.revenue));
                if (entry.op != null) parts.push('OP ' + fmt(entry.op));
                lines.push(annTxt + parts.join(' / ') + ' ' + meta.unit);
              }
              // Quarterly estimates
              [1,2,3,4].forEach(q => {
                const r = entry['q'+q+'r'], o = entry['q'+q+'op'];
                if (r != null || o != null) {
                  let txt = '  ' + q + 'Q: ';
                  const parts = [];
                  if (r != null) parts.push('매출 ' + fmt(r));
                  if (o != null) parts.push('OP ' + fmt(o));
                  lines.push(txt + parts.join(' / ') + ' ' + meta.unit);
                }
              });
              return lines;
            }
          }
        }
      }
    }
  });
}

// ── Consensus Estimate Stats Cards ──
function selectConTab(tab) {
  activeConTab = tab;
  renderConStats();
}

function formatConVal(v, unit) {
  if (unit === '조원') return v.toFixed(1);
  return Math.round(v).toLocaleString();
}

function renderConStats() {
  const wrap = document.getElementById('conStatsWrap');
  const meta = stockMeta[activeStock];
  if (!meta) { wrap.style.display = 'none'; return; }

  const stockEntries = entries.filter(e => e.stock === activeStock);

  // Check what data is available
  const hasAnnual = stockEntries.some(e => e.revenue != null || e.op != null);

  if (!hasAnnual) { wrap.style.display = 'none'; return; }

  wrap.style.display = 'block';

  // Build tabs: 연간 + Q1~Q4 always shown when annual data exists
  const tabs = [{ key:'annual', label:'연간' }];
  [1,2,3,4].forEach(q => {
    tabs.push({ key:'q'+q, label:q+'Q' });
  });

  if (!tabs.find(t => t.key === activeConTab)) activeConTab = tabs[0].key;

  document.getElementById('conTabs').innerHTML = tabs.map(t =>
    `<div class="con-tab ${t.key === activeConTab ? 'active' : ''}" onclick="selectConTab('${t.key}')">${t.label}</div>`
  ).join('');

  // Get values for active tab
  let revItems, opItems;
  if (activeConTab === 'annual') {
    revItems = stockEntries.filter(e => e.revenue != null).map(e => ({ date:e.date, broker:e.broker, val:e.revenue }));
    opItems = stockEntries.filter(e => e.op != null).map(e => ({ date:e.date, broker:e.broker, val:e.op }));
  } else {
    const q = activeConTab; // 'q1','q2','q3','q4'
    revItems = stockEntries.filter(e => e[q+'r'] != null).map(e => ({ date:e.date, broker:e.broker, val:e[q+'r'] }));
    opItems = stockEntries.filter(e => e[q+'op'] != null).map(e => ({ date:e.date, broker:e.broker, val:e[q+'op'] }));
  }

  const unit = meta.unit;
  let html = '';

  function buildCardRow(label, dotClass, items) {
    if (items.length === 0) return '';
    items.sort((a,b) => a.date.localeCompare(b.date));
    // 최근 3개월 기준 평균
    const now = new Date();
    const threeMonthsAgo = new Date(now);
    threeMonthsAgo.setMonth(threeMonthsAgo.getMonth() - 3);
    const cutoff = threeMonthsAgo.toISOString().slice(0,10);
    const recentItems = items.filter(e => e.date >= cutoff);
    const avgItems = recentItems.length > 0 ? recentItems : items;
    const avgVals = avgItems.map(e => e.val);
    const avg = avgVals.reduce((a,b) => a+b, 0) / avgVals.length;
    const avgBrokers = [...new Set(avgItems.map(e => e.broker).filter(Boolean))].length;

    const allVals = items.map(e => e.val);
    const max = Math.max(...allVals);
    const min = Math.min(...allVals);
    const latest = items[items.length - 1];

    return `<div class="con-group-label"><span class="${dotClass}"></span>${label} (${unit})</div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">컨센서스 평균 <span style="font-size:9px;color:var(--accent)">(3개월)</span></div><div class="stat-value">${formatConVal(avg, unit)}</div><div class="stat-sub">${avgItems.length}건 · ${avgBrokers}개 증권사</div></div>
      <div class="stat-card"><div class="stat-label">최고</div><div class="stat-value">${formatConVal(max, unit)}</div></div>
      <div class="stat-card"><div class="stat-label">최저</div><div class="stat-value">${formatConVal(min, unit)}</div></div>
      <div class="stat-card"><div class="stat-label">최신</div><div class="stat-value">${formatConVal(latest.val, unit)}</div><div class="stat-sub">${latest.date}</div></div>
    </div>`;
  }

  html += buildCardRow('매출', 'dot-rev', revItems);
  html += buildCardRow('영업이익', 'dot-op', opItems);

  if (!html) html = '<div class="con-no-data">해당 분기 추정치 데이터가 없습니다</div>';

  document.getElementById('conStatsBody').innerHTML = html;
}

// ── Quarterly Consensus Table ──
function selectQTab(q) {
  activeQTab = q;
  renderConTable();
}

function renderConTable() {
  const wrap = document.getElementById('conTableWrap');
  const meta = stockMeta[activeStock];
  if (!meta) { wrap.style.display = 'none'; return; }

  const stockEntries = entries.filter(e => e.stock === activeStock);
  const hasAnyEst = stockEntries.some(e => e.revenue != null || e.op != null);
  if (!hasAnyEst) { wrap.style.display = 'none'; return; }

  wrap.style.display = 'block';
  const unit = meta.unit;
  const fmt = v => v == null ? '-' : (unit === '조원' ? v.toFixed(1) : Math.round(v).toLocaleString());

  // Always show Q1~Q4 tabs when annual estimates exist
  const qTabs = [1,2,3,4].map(q => ({ key: q+'q', label: q+'Q' }));
  if (!qTabs.find(t => t.key === activeQTab)) activeQTab = qTabs[0].key;

  document.getElementById('conTableTabs').innerHTML = qTabs.map(t =>
    `<div class="con-table-tab ${t.key === activeQTab ? 'active' : ''}" onclick="selectQTab('${t.key}')">${t.label}</div>`
  ).join('');

  // Get data for active quarter
  const qNum = activeQTab.replace('q','');
  const rKey = 'q'+qNum+'r', oKey = 'q'+qNum+'op';
  const qItems = stockEntries
    .filter(e => e[rKey] != null || e[oKey] != null)
    .sort((a,b) => b.date.localeCompare(a.date)); // newest first

  if (qItems.length === 0) {
    document.getElementById('conTableBody').innerHTML = '<div class="con-no-data">해당 분기 데이터가 없습니다</div>';
    return;
  }

  // Table
  let html = '<div class="con-table-scroll"><table class="con-table"><thead><tr>';
  html += '<th>날짜</th><th>증권사</th><th class="col-num">매출 ('+unit+')</th><th class="col-num">영업이익 ('+unit+')</th>';
  html += '</tr></thead><tbody>';
  qItems.forEach(e => {
    html += `<tr>
      <td class="col-date">${e.date}</td>
      <td class="col-broker">${e.broker || '-'}</td>
      <td class="col-num col-rev">${fmt(e[rKey])}</td>
      <td class="col-num col-op">${fmt(e[oKey])}</td>
    </tr>`;
  });
  html += '</tbody></table></div>';

  // Summary row
  const revVals = qItems.map(e => e[rKey]).filter(v => v != null);
  const opVals = qItems.map(e => e[oKey]).filter(v => v != null);

  // 최근 3개월 기준 평균
  const now = new Date();
  const cutoff3m = new Date(now); cutoff3m.setMonth(cutoff3m.getMonth() - 3);
  const cutStr = cutoff3m.toISOString().slice(0,10);
  const recentRev = qItems.filter(e => e.date >= cutStr && e[rKey] != null).map(e => e[rKey]);
  const recentOp = qItems.filter(e => e.date >= cutStr && e[oKey] != null).map(e => e[oKey]);

  const avgR = recentRev.length > 0 ? recentRev : revVals;
  const avgO = recentOp.length > 0 ? recentOp : opVals;

  html += '<div class="con-table-summary">';
  if (revVals.length) {
    const avg = avgR.reduce((a,b)=>a+b,0)/avgR.length;
    html += `<span class="sum-item"><span class="sum-label">매출 평균(3M):</span><span class="sum-val sum-rev">${fmt(avg)}</span></span>`;
    html += `<span class="sum-item"><span class="sum-label">최고:</span><span class="sum-val sum-rev">${fmt(Math.max(...revVals))}</span></span>`;
    html += `<span class="sum-item"><span class="sum-label">최저:</span><span class="sum-val sum-rev">${fmt(Math.min(...revVals))}</span></span>`;
  }
  if (opVals.length) {
    html += `<span class="sum-item" style="margin-left:8px"><span class="sum-label">OP 평균(3M):</span><span class="sum-val sum-op">${fmt(avgO.reduce((a,b)=>a+b,0)/avgO.length)}</span></span>`;
    html += `<span class="sum-item"><span class="sum-label">최고:</span><span class="sum-val sum-op">${fmt(Math.max(...opVals))}</span></span>`;
    html += `<span class="sum-item"><span class="sum-label">최저:</span><span class="sum-val sum-op">${fmt(Math.min(...opVals))}</span></span>`;
  }
  html += '</div>';

  document.getElementById('conTableBody').innerHTML = html;
}

// ── Consensus Chart (리포트별 매출/영업이익 시계열) ──
function renderConsensusChart() {
  if (conChart) conChart.destroy();
  const wrap = document.getElementById('consensusWrap');
  const meta = stockMeta[activeStock];
  // estYear, revenue, op 필드가 있는 엔트리만 필터
  const conItems = entries.filter(e => e.stock === activeStock && e.revenue != null && e.op != null)
    .sort((a,b) => a.date.localeCompare(b.date));
  if (conItems.length === 0 || !meta) { wrap.style.display = 'none'; return; }

  wrap.style.display = 'block';
  const estYears = [...new Set(conItems.map(e => e.estYear).filter(Boolean))];
  document.getElementById('consensusUnit').textContent = '단위: ' + meta.unit + (estYears.length ? ' · 추정: ' + estYears.join(', ') : '');
  const mob = isMobile();
  const palette = ['#6366f1','#16a34a','#ea580c','#0891b2','#db2777','#dc2626','#7c3aed','#0d9488','#c2410c','#9333ea','#059669','#be123c'];
  const allDates = [...new Set(conItems.map(e => e.date))].sort();
  const labels = allDates.map(d => { const p = d.split('-'); return p[1]+'/'+p[2]; });
  const brokers = [...new Set(conItems.map(e => e.broker || '미지정'))];
  const datasets = [];

  // 증권사별 scatter (포인트만, 선 없음)
  brokers.forEach((broker, i) => {
    const bItems = conItems.filter(e => (e.broker||'미지정') === broker);
    const revArr = allDates.map(d => { const m = bItems.find(e => e.date === d); return m ? m.revenue : null; });
    const opArr = allDates.map(d => { const m = bItems.find(e => e.date === d); return m ? m.op : null; });
    const col = palette[i % palette.length];

    datasets.push({
      label: broker + ' 매출',
      data: revArr,
      borderColor: 'transparent',
      backgroundColor: col,
      borderWidth: 0,
      pointRadius: revArr.map(v => v !== null ? (mob ? 4 : 5) : 0),
      pointHoverRadius: mob ? 6 : 8,
      pointBackgroundColor: col,
      pointBorderColor: '#fff',
      pointBorderWidth: 1.5,
      pointStyle: 'circle',
      showLine: false,
      fill: false,
      yAxisID: 'yRev',
    });
    datasets.push({
      label: broker + ' OP',
      data: opArr,
      borderColor: 'transparent',
      backgroundColor: col,
      borderWidth: 0,
      pointRadius: opArr.map(v => v !== null ? (mob ? 4 : 5) : 0),
      pointHoverRadius: mob ? 6 : 8,
      pointBackgroundColor: col,
      pointBorderColor: '#fff',
      pointBorderWidth: 1.5,
      pointStyle: 'rectRot',
      showLine: false,
      fill: false,
      yAxisID: 'yOp',
    });
  });

  // 날짜순 매출 연결선 (실선) — TP 차트 컨센 평균과 동일 방식
  const revByDate = allDates.map(d => {
    const vals = conItems.filter(e => e.date === d).map(e => e.revenue);
    return vals.length ? +(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1) : null;
  });
  let lastRev = null;
  const filledRev = revByDate.map(v => { if(v!==null) lastRev=v; return lastRev; });
  datasets.unshift({
    label: '매출 추이',
    data: filledRev,
    borderColor: '#6366f1',
    borderWidth: mob ? 1.5 : 2,
    pointRadius: revByDate.map(v => v !== null ? (mob ? 1.5 : 2) : 0),
    pointBackgroundColor: '#6366f1',
    stepped: 'before',
    fill: false,
    yAxisID: 'yRev',
  });

  // 날짜순 OP 연결선 (점선)
  const opByDate = allDates.map(d => {
    const vals = conItems.filter(e => e.date === d).map(e => e.op);
    return vals.length ? +(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1) : null;
  });
  let lastOp = null;
  const filledOp = opByDate.map(v => { if(v!==null) lastOp=v; return lastOp; });
  datasets.unshift({
    label: 'OP 추이',
    data: filledOp,
    borderColor: '#ea580c',
    borderWidth: mob ? 1.5 : 2,
    borderDash: [6, 3],
    pointRadius: opByDate.map(v => v !== null ? (mob ? 1.5 : 2) : 0),
    pointBackgroundColor: '#ea580c',
    stepped: 'before',
    fill: false,
    yAxisID: 'yOp',
  });

  const ctx = document.getElementById('consensusChart').getContext('2d');
  conChart = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      scales: {
        x: {
          grid: { color: 'rgba(0,0,0,.04)' },
          ticks: { color: '#7c7c8a', font: { size: mob ? 10 : 11 }, maxRotation: 45 }
        },
        yRev: {
          position: 'left',
          grid: { color: 'rgba(0,0,0,.04)' },
          title: { display: !mob, text: '매출 (' + meta.unit + ')', color: '#6366f1', font: { size: 11 } },
          ticks: { color: '#6366f1', font: { size: mob ? 9 : 11 },
            callback: v => v >= 10000 ? (v/10000).toFixed(0)+'만' : v.toLocaleString()
          },
        },
        yOp: {
          position: 'right',
          grid: { display: false },
          title: { display: !mob, text: '영업이익 (' + meta.unit + ')', color: '#ea580c', font: { size: 11 } },
          ticks: { color: '#ea580c', font: { size: mob ? 9 : 11 },
            callback: v => v >= 10000 ? (v/10000).toFixed(0)+'만' : v.toLocaleString()
          },
        },
      },
      plugins: {
        legend: {
          display: false
        },
        tooltip: {
          backgroundColor: '#fff', borderColor: '#e0e0e6', borderWidth: 1,
          titleColor: '#1a1a2e', bodyColor: '#1a1a2e',
          callbacks: {
            title: ti => allDates[ti[0].dataIndex] || '',
            label: ctx => {
              if (ctx.parsed.y === null) return null;
              return ctx.dataset.label + ': ' + ctx.parsed.y.toLocaleString() + ' ' + meta.unit;
            }
          }
        }
      }
    }
  });
}

function exportJSON() {

function importJSON(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = () => {
    try {
      const p = JSON.parse(r.result);
      if (p.entries) entries = p.entries;
      if (p.myTargets) myTargets = p.myTargets;
      updateSuggestions();
      activeStock = getStocks()[0] || null;
      render();
    } catch(err) { alert('파일 오류: ' + err.message); }
  };
  r.readAsText(f);
  e.target.value = '';
}
function exportCSV() {
  if (!entries.length) { alert('데이터 없음'); return; }
  let csv = '종목,날짜,증권사,목표주가,출처\n';
  entries.forEach(e => { csv += `${e.stock},${e.date},${e.broker},${e.tp},"${(e.source||'').replace(/"/g,'""')}"\n`; });
  dl(csv, 'tp-tracker.csv', 'text/csv');
}
function dl(content, name, type) {
  const b = new Blob([content], {type: type+';charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(b); a.download = name; a.click();
  URL.revokeObjectURL(a.href);
}

function toggleUpdatePanel(e) {
  e.stopPropagation();
  const panel = document.getElementById('updatePanel');
  const isOpen = panel.classList.contains('open');
  panel.classList.toggle('open');
  if (!isOpen) renderUpdatePanel();
}
document.addEventListener('click', (e) => {
  const panel = document.getElementById('updatePanel');
  if (panel && !panel.contains(e.target) && !document.getElementById('updateLogBtn').contains(e.target)) {
    panel.classList.remove('open');
  }
});

function renderUpdatePanel() {
  const body = document.getElementById('updatePanelBody');
  const dateEl = document.getElementById('updatePanelDate');
  if (!updateLog.length) {
    body.innerHTML = '<div class="update-empty">업데이트 내역이 없습니다</div>';
    return;
  }
  dateEl.textContent = '최종 ' + updateLog[0].date;
  body.innerHTML = updateLog.map(log => {
    const itemsHtml = log.items.map(it =>
      `<div class="update-entry" onclick="selectStock('${esc(it.stock)}');document.getElementById('updatePanel').classList.remove('open');">
        <span class="stock-badge">${it.stock}</span>
        <span class="broker-date">${it.broker} · ${it.entryDate}</span>
        <span class="tp-value">${it.tp.toLocaleString()}원</span>
      </div>`
    ).join('');
    return `<div class="update-group">
      <div class="update-group-title">${log.date} 업데이트 <span class="count">+${log.items.length}건</span></div>
      ${itemsHtml}
    </div>`;
  }).join('');
}
